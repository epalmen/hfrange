# HF Range Tracker — Station Configuration
# Edit this file before running

station:
  callsign: "PD1LVH"
  latitude: 52.3676       # Amsterdam
  longitude: 4.9041

radio:
  # Serial port for IC-7300 USB CI-V connection.
  # Override at runtime: --port COM3  (Windows) or --port /dev/ttyUSB0 (Linux)
  # The web UI lets you pick from a dropdown.
  port: "COM3"            # Windows default; Linux: /dev/ttyUSB0
  baud: 19200
  model: 373              # hamlib model number for IC-7300
  rigctld_host: "localhost"
  rigctld_port: 4532

bands:
  # Each band: name, dial frequency (Hz), mode, tone_hz
  # tone_hz = audio tone transmitted on SSB (appears at dial + tone on spectrum)
  - name: "40m"
    frequency_hz: 7090000
    mode: "USB"
    tone_hz: 1000
  - name: "20m"
    frequency_hz: 14300000
    mode: "USB"
    tone_hz: 1000
  - name: "10m"
    frequency_hz: 28500000
    mode: "USB"
    tone_hz: 1000

scan:
  min_distance_km: 300    # Skip zone — don't check closer than this
  max_distance_km: 15000
  max_receivers: 20       # KiwiSDRs to check per band
  sample_duration: 12     # Seconds of audio to sample per receiver
  pause_between: 2        # Seconds between receivers
  tone_detect_snr_db: 10  # Minimum SNR to consider signal "heard"

tone:
  # Duration to transmit the test tone per receiver check
  tx_duration_s: 10
  # Audio device name (substring match). Leave empty to use system default.
  # Windows example: "USB Audio CODEC"
  # Find your device with: python -m sounddevice
  audio_device: ""
