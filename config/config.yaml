# HF Range Tracker - Configuration
# Fill in your details before running

station:
  callsign: "YOUR_CALL"
  # Your location (used to calculate distance to KiwiSDR receivers)
  latitude: 52.0           # decimal degrees
  longitude: 5.0           # decimal degrees (Netherlands approx)
  locator: "JO22"          # Maidenhead grid locator

radio:
  # IC-7300 serial port
  # Linux:   /dev/ttyUSB0  or  /dev/ttyACM0
  # Windows: COM3
  # macOS:   /dev/cu.usbserial-...
  port: "/dev/ttyUSB0"
  baud: 19200
  # hamlib model number for IC-7300
  model: 373
  # rigctld TCP port (if using daemon mode)
  rigctld_host: "localhost"
  rigctld_port: 4532

scan:
  # Frequency in Hz (e.g. 14.200 MHz = 14200000)
  frequency: 14200000
  mode: "USB"              # USB, LSB, CW, AM, FM
  # Minimum distance to check (km) - skip zone, signals bounce over this area
  min_distance_km: 300
  # Maximum distance to check (km)
  max_distance_km: 15000
  # Max number of KiwiSDRs to check per scan
  max_receivers: 20
  # Seconds to sample RSSI on each KiwiSDR
  sample_duration: 10
  # Pause between receivers (seconds)
  pause_between: 2

signal:
  # Minimum RSSI (dBm) to consider the signal "heard"
  rssi_threshold: -120
  # Optional: narrow passband offset from dial frequency (Hz)
  # e.g. for a 1000 Hz CW tone set to 1000
  tone_offset_hz: 0
